<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>타이타닉 생존자 예측</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #667085;
        --primary: #1d4ed8;
        --primary-dark: #1e40af;
        --line: #e4e7ec;
        --field: #f8fafc;
        --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(29, 78, 216, 0.14), transparent 32rem),
          linear-gradient(135deg, #eef4ff 0%, var(--bg) 48%, #f8fafc 100%);
      }

      .page {
        width: min(1040px, 92vw);
        margin: 0 auto;
        padding: 48px 0;
      }

      .hero {
        overflow: hidden;
        border-radius: 28px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .hero-image {
        width: 100%;
        height: 230px;
        object-fit: cover;
        display: block;
        filter: saturate(0.9) contrast(1.05);
      }

      .content {
        padding: 34px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--primary);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        line-height: 1.2;
      }

      .description {
        margin: 14px 0 28px;
        color: var(--muted);
        line-height: 1.7;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .field {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--field);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      .hint {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      input,
      select {
        width: 100%;
        height: 44px;
        padding: 0 12px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
        color: var(--text);
        font: inherit;
      }

      input:focus,
      select:focus {
        outline: 3px solid rgba(29, 78, 216, 0.18);
        border-color: var(--primary);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 24px;
      }

      button {
        min-width: 180px;
        height: 50px;
        border: 0;
        border-radius: 999px;
        background: var(--primary);
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.25);
        transition: transform 0.16s ease, background 0.16s ease;
      }

      button:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
      }

      @media (max-width: 760px) {
        .page { padding: 24px 0; }
        .content { padding: 24px; }
        .hero-image { height: 180px; }
        .form-grid { grid-template-columns: 1fr; }
        .actions { justify-content: stretch; }
        button { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-labelledby="page-title">
        <img
          class="hero-image"
          src="https://upload.wikimedia.org/wikipedia/commons/f/fd/RMS_Titanic_3.jpg"
          alt="RMS Titanic"
        />

        <div class="content">
          <p class="eyebrow">Titanic Survival Prediction</p>
          <h1 id="page-title">타이타닉 생존자 예측</h1>
          <p class="description">
            승객 정보를 입력하면 학습된 모델이 생존 여부를 예측합니다.
          </p>

          <form method="post" action="/results">
            <div class="form-grid">
              <div class="field">
                <label for="Pclass">티켓 등급</label>
                <select id="Pclass" name="Pclass">
                  <option value="1" selected>1등석</option>
                  <option value="2">2등석</option>
                  <option value="3">3등석</option>
                </select>
                <p class="hint">Pclass: 1, 2, 3</p>
              </div>

              <div class="field">
                <label for="Sex">성별</label>
                <select id="Sex" name="Sex">
                  <option value="0">남성</option>
                  <option value="1" selected>여성</option>
                </select>
                <p class="hint">Sex: male=0, female=1</p>
              </div>

              <div class="field">
                <label for="Age">나이</label>
                <input id="Age" type="number" name="Age" min="0" step="1" value="10" />
                <p class="hint">예: 10</p>
              </div>

              <div class="field">
                <label for="SibSp">형제자매·배우자 수</label>
                <input id="SibSp" type="number" name="SibSp" min="0" step="1" value="0" />
                <p class="hint">SibSp: 동승한 형제자매/배우자 수 총합</p>
              </div>

              <div class="field">
                <label for="Parch">부모·자녀 수</label>
                <input id="Parch" type="number" name="Parch" min="0" step="1" value="2" />
                <p class="hint">Parch: 동승한 부모/자녀 수 총합</p>
              </div>

              <div class="field">
                <label for="Fare">탑승 요금</label>
                <input id="Fare" type="number" name="Fare" min="0" step="0.01" value="20" />
                <p class="hint">예: 20</p>
              </div>

              <div class="field">
                <label for="Embarked">탑승 항구</label>
                <select id="Embarked" name="Embarked">
                  <option value="0" selected>Southampton (S)</option>
                  <option value="1">Cherbourg (C)</option>
                  <option value="2">Queenstown (Q)</option>
                </select>
                <p class="hint">Embarked: S=0, C=1, Q=2</p>
              </div>
            </div>

            <div class="actions">
              <button type="submit">예측하기</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
